name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo run build --filter=!@epitaph-dev/web

      - name: Unit tests (104 tests across 13 suites)
        run: npx turbo run test --filter=!@epitaph-dev/web

      - name: Type check
        run: npx turbo run lint --filter=!@epitaph-dev/web

  ground-truth:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run on Node 20 — this hits live APIs, no need to triple-run it
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npx turbo run build --filter=epitaph-dev-core

      - name: Ground truth validation (30/30 packages)
        run: npx tsx packages/core/test/ground-truth/validate.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  self-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npx turbo run build --filter=epitaph-dev-core && npx turbo run build --filter=epitaph-dev

      - name: Scan epitaph's own dependencies
        run: node packages/cli/dist/epitaph.js --production-only --fail-grade F
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
